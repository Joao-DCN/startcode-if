<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Pergunta - startcode-if</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container container-navbar">

            <a href="index.html" class="navbar-brand">
                <span class="text-success">&lt;</span>startcode-if<span class="text-success">/&gt;</span>
            </a>

            <div class="navbar-menu">
                <a href="index.html">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="meu-perfil.html">Meu Perfil</a>
                <a href="login.html">Sair</a>
            </div>

        </div>
    </nav>

    <main class="container main-content">

        <div class="question-form-page">

            <div class="card">

                <div class="card-body">

                    <div class="text-center">
                        <h1 class="page-title">
                            Nova Pergunta
                        </h1>

                        <div class="heading-line"></div>

                        <p class="login-description">
                            Compartilhe sua dúvida com a comunidade.
                        </p>
                    </div>

                    <form>

    <div class="form-group">

        <label class="form-label" for="categoria">
            Categoria
        </label>

        <select
            id="categoria"
            class="form-control"
            required>

            <option value="" selected disabled>
                Selecione uma categoria
            </option>

            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="javascript">JavaScript</option>
            <option value="php">PHP</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="banco-de-dados">Banco de Dados</option>

        </select>

    </div>

    <div class="form-group">

        <label class="form-label" for="titulo">
            Título da Pergunta
        </label>

        <input
            type="text"
            id="titulo"
            class="form-control"
            placeholder="Digite um título objetivo"
            required>

    </div>

    <div class="form-group">

        <label class="form-label" for="descricao">
            Descrição
        </label>

        <textarea
            id="descricao"
            class="form-control textarea"
            rows="8"
            placeholder="Explique sua dúvida com o máximo de detalhes possível."
            required></textarea>

    </div>

    <div class="button-group">

        <button type="submit" class="btn btn-success btn-auto">
            Publicar Pergunta
        </button>

        <button type="reset" class="btn btn-secondary btn-auto">
            Limpar
        </button>

    </div>

</form>

                </div>

                <div class="card-footer">
                    <small>Faça perguntas claras para receber melhores respostas.</small>
                </div>

            </div>

        </div>

    </main>

    <footer class="footer">
        <div class="container">
            <small>&copy; 2026 startcode-if. Todos os direitos reservados.</small>
        </div>
    </footer>

</body>
</html>
