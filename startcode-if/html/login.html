<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - startcode-if</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container container-navbar">
            <a href="#" class="navbar-brand">
                <span class="text-success">&lt;</span>startcode-if<span class="text-success">/&gt;</span>
            </a>
        </div>
    </nav>

    <main class="container main-content">

        <div class="card login-card">

            <div class="card-body">

                <div class="text-center">
                    <h1 class="page-title">Entrar</h1>
                    <div class="heading-line"></div>
                    <p class="login-description">
                        Faça login para acessar sua conta.
                    </p>
                </div>

                <form action="index.html">

                    <div class="form-group">
                        <label class="form-label" for="email">
                            E-mail
                        </label>

                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            placeholder="Digite seu e-mail"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="senha">
                            Senha
                        </label>

                        <input
                            type="password"
                            id="senha"
                            class="form-control"
                            placeholder="Digite sua senha"
                            required>
                    </div>

                    <button type="submit" class="btn btn-success">
                        Entrar
                    </button>

                </form>

                <div class="login-footer">
                    <p>
                        Não possui uma conta?
                        <a href="cadastro.html">Cadastre-se</a>
                    </p>
                </div>

            </div>

            <div class="card-footer">
                <small>Bem-vindo ao <strong>startcode-if</strong></small>
            </div>

        </div>

    </main>

    <footer class="footer">
        <div class="container">
            <small>&copy; 2026 startcode-if. Todos os direitos reservados.</small>
        </div>
    </footer>

</body>
</html>
